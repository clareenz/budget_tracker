{% extends 'budget_app/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 px-4 py-6 sm:p-8 bg-white shadow-md rounded-lg">
  <h2 class="text-2xl font-bold text-center text-red-600 mb-6">Delete Entry</h2>

  <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-5 rounded mb-6 text-center">
    <p class="mb-2">Are you sure you want to delete the following entry?</p>
    <p class="font-semibold">
      {{ entry.title }} – Php {{ entry.amount|floatformat:2 }} 
      ({{ entry.get_type_display }}) on {{ entry.date }}
    </p>
  </div>

  <form method="POST" class="flex flex-col sm:flex-row justify-center gap-4">
    {% csrf_token %}
    <button type="submit"
      class="w-full sm:w-auto text-center bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-6 rounded">
      Delete
    </button>
    <a href="{% url 'history' %}"
      class="w-full sm:w-auto text-center bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
