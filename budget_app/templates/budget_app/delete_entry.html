{% extends 'budget_app/base.html' %}

{% block content %}
<div class="max-w-sm sm:max-w-lg md:max-w-2xl mx-auto mt-6 sm:mt-10 bg-[#1b1b1b] shadow-md rounded-md p-4 sm:p-6 md:p-8 text-xs sm:text-sm md:text-base">
  <h2 class="text-lg sm:text-xl font-bold text-center text-red-400 mb-4 sm:mb-6">Delete Entry</h2>

  <div class="bg-[#2e1b1b] border border-red-500 text-red-400 px-4 py-3 rounded text-center mb-6">
    <p class="mb-2">Are you sure you want to delete the following entry?</p>
    <p class="font-semibold text-sm sm:text-base">
      {{ entry.title }} – Php {{ entry.amount|floatformat:2 }} 
      ({{ entry.get_type_display }}) on {{ entry.date }}
    </p>
  </div>

  <form method="POST" class="flex flex-col sm:flex-row justify-center gap-2 sm:gap-4 text-[10px] sm:text-xs">
    {% csrf_token %}
    <button type="submit"
      class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-semibold py-1 px-4 sm:px-6 rounded transition">
      Delete
    </button>
    <a href="{% url 'history' %}"
      class="w-full sm:w-auto bg-[#28282a] hover:bg-[#3a3a3a] text-[#00dac6] font-semibold py-1 px-4 sm:px-6 rounded text-center transition">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
