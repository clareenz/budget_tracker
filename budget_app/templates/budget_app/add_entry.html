{% extends 'budget_app/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-[#1b1b1b] shadow-md rounded-lg p-6 sm:p-8 add-entry-container">
  <h2 class="text-2xl font-bold mb-6 text-center text-white">Add Income/Expense</h2>

  <form method="POST" class="space-y-6">
    {% csrf_token %}

    <!-- Type -->
    <div>
      <label for="{{ form.type.id_for_label }}" class="block text-[#a4a4a4] mb-2 font-semibold">Type:</label>
      <div class="w-full">{{ form.type }}</div>
    </div>

    <!-- Title -->
    <div>
      <label for="{{ form.title.id_for_label }}" class="block text-[#a4a4a4] mb-2 font-semibold">Title:</label>
      <div class="w-full">{{ form.title }}</div>
    </div>

    <!-- Amount -->
    <div>
      <label for="{{ form.amount.id_for_label }}" class="block text-[#a4a4a4] mb-2 font-semibold">Amount:</label>
      <div class="w-full">{{ form.amount }}</div>
    </div>

    <!-- Category -->
    <div>
      <label for="{{ form.category.id_for_label }}" class="block text-[#a4a4a4] mb-2 font-semibold">Category:</label>
      <div class="w-full">{{ form.category }}</div>
    </div>

    <!-- Date -->
    <div>
      <label for="{{ form.date.id_for_label }}" class="block text-[#a4a4a4] mb-2 font-semibold">Date:</label>
      <div class="w-full">{{ form.date }}</div>
    </div>

    <!-- Notes -->
    <div>
      <label for="{{ form.notes.id_for_label }}" class="block text-[#a4a4a4] mb-2 font-semibold">Notes:</label>
      <div class="w-full">{{ form.notes }}</div>
    </div>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row justify-center gap-4 mt-6">
      <button type="submit"
        class="w-full sm:w-auto text-center bg-[#00dac6] hover:bg-[#00c7ab] hover:text-white text-black font-semibold py-2 px-6 rounded transition duration-300">
        Save Entry
      </button>
      <a href="{% url 'dashboard' %}"
        class="w-full sm:w-auto text-center bg-[#28282a] hover:bg-transparent text-[#00dac6] font-semibold py-2 px-6 rounded transition duration-300">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
