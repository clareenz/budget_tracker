{% extends 'budget_app/base.html' %}

{% block content %}
<div class="register-container max-w-md mx-auto mt-12 px-3 sm:px-0 bg-[#28282a] shadow-lg rounded-lg p-4 sm:p-6">
  <h2 class="text-xl sm:text-2xl font-bold mb-6 text-center text-[#d8fffb]">Register</h2>
  
  <form method="post" class="space-y-4 sm:space-y-6 text-xs sm:text-sm">
    {% csrf_token %}
    
    {% for field in form %}
      <div>
        <label class="block text-[#d8fffb] font-semibold sm:pl-4 sm:pr-4 mb-1 sm:mb-2">{{ field.label_tag }}</label>
        <div class="w-full sm:pl-4 sm:pr-4 text-black text-xs sm:text-sm">{{ field }}</div>
        {% if field.errors %}
          <p class="text-red-500 text-[10px] sm:text-xs mt-1">{{ field.errors }}</p>
        {% endif %}
      </div>
    {% endfor %}
    
    <div class="flex justify-center">
      <button type="submit"
        class="w-auto bg-[#00dac6] hover:bg-[#00c7ab] hover:text-white text-black font-semibold py-1.5 px-4 rounded-md transition duration-300 text-xs sm:text-sm">
        Sign Up
      </button>
    </div>
  </form>
</div>
{% endblock %}
