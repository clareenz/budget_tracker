{% extends 'budget_app/base.html' %}

{% block content %}
<div class="container text-center mt-5">
    <h1>Welcome to Personal Budget Tracker</h1>
    <p>Manage your income and expenses easily.</p>

    {% if not request.user.is_authenticated %}
        <a href="{% url 'login' %}" class="btn btn-primary mt-3">Login</a>
        <a href="{% url 'register' %}" class="btn btn-success mt-3">Register</a>
    {% else %}
        <a href="{% url 'dashboard' %}" class="btn btn-primary mt-3">Go to Dashboard</a>
    {% endif %}
</div>
{% endblock %}
