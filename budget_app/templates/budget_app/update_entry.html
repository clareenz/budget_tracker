{% extends 'budget_app/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-[#1b1b1b] shadow-md rounded-lg p-8 update-entry-container">
  <h2 class="text-2xl font-bold mb-6 text-center text-white">Update Entry</h2>

  <form method="POST" class="space-y-6">
    {% csrf_token %}
    
    {% for field in form %}
      <div>
        <label class="block text-[#a4a4a4] mb-2 font-semibold">{{ field.label_tag }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="text-red-500 text-sm mt-1">{{ field.errors }}</p>
        {% endif %}
      </div>
    {% endfor %}
    
    <div class="flex justify-center space-x-4 mt-6">
      <button type="submit" class="bg-[#00dac6] hover:bg-[#00c7ab] hover:text-white text-black font-semibold py-2 px-6 rounded transition duration-300">
        Update
      </button>
      <a href="{% url 'history' %}" class="bg-[#28282a] hover:bg-transparent text-[#00dac6] font-semibold py-2 px-6 rounded">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
