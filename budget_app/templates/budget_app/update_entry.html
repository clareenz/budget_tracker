{% extends 'budget_app/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Update Entry</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'history' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
