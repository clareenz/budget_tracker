{% extends 'budget_app/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-white shadow-lg rounded-lg p-8">
  <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Update Entry</h2>

  <form method="POST" class="space-y-6">
    {% csrf_token %}
    
    {% for field in form %}
      <div>
        <label class="block text-gray-700 font-semibold mb-2">{{ field.label_tag }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="text-red-500 text-sm mt-1">{{ field.errors }}</p>
        {% endif %}
      </div>
    {% endfor %}
    
    <div class="flex justify-center space-x-4 mt-6">
      <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-300">
        Update
      </button>
      <a href="{% url 'history' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-6 rounded-lg transition duration-300">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
