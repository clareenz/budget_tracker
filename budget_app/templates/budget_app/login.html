{% extends 'budget_app/base.html' %}

{% block content %}
<div class="login-container max-w-md mx-auto mt-16 px-4 sm:px-0 bg-[#28282a] shadow-lg rounded-lg p-6 sm:p-8">
  <h2 class="text-3xl font-bold mb-8 text-center text-[#d8fffb]">Login</h2>
  
  <form method="post" class="space-y-6">
    {% csrf_token %}
    
    {% for field in form %}
      <div>
        <label class="block text-[#d8fffb] font-semibold mb-2">{{ field.label_tag }}</label>
        <div class="w-full">{{ field }}</div>
        {% if field.errors %}
          <p class="text-red-500 text-sm mt-1">{{ field.errors }}</p>
        {% endif %}
      </div>
    {% endfor %}
    
    <button type="submit"
      class="w-full bg-[#00dac6] hover:bg-[#00c7ab] hover:text-white text-black font-semibold py-2 rounded-lg transition duration-300">
      Log In
    </button>
  </form>
</div>
{% endblock %}
