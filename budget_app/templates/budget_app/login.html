{% extends 'budget_app/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white shadow-lg rounded-lg p-8">
  <h2 class="text-3xl font-bold mb-8 text-center text-gray-800">Login</h2>
  
  <form method="post" class="space-y-6">
    {% csrf_token %}
    
    {% for field in form %}
      <div>
        <label class="block text-gray-700 font-semibold mb-2">{{ field.label_tag }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="text-red-500 text-sm mt-1">{{ field.errors }}</p>
        {% endif %}
      </div>
    {% endfor %}
    
    <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded-lg transition duration-300">
      Login
    </button>
  </form>
</div>
{% endblock %}
