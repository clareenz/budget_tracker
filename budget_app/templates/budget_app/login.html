{% extends 'budget_app/base.html' %}

{% block content %}
<div class="login-container max-w-sm sm:max-w-md mx-auto mt-12 sm:mt-16 px-3 sm:px-0 bg-[#28282a] shadow-md rounded-md p-4 sm:p-6 text-xs sm:text-sm">
  <h2 class="text-lg sm:text-xl font-bold mb-6 text-center text-[#d8fffb]">Login</h2>
  
  <form method="post" class="space-y-4 sm:space-y-5">
    {% csrf_token %}
    
    {% for field in form %}
      <div>
        <label class="block text-[#d8fffb] font-semibold mb-1 sm:pl-4 sm:pr-4 sm:mb-2">{{ field.label_tag }}</label>
        <div class="sm:pl-4 sm:pr-4 w-full">{{ field }}</div>
        {% if field.errors %}
          <p class="text-red-500 text-xs mt-1">{{ field.errors }}</p>
        {% endif %}
      </div>
    {% endfor %}
    
    <div class="flex justify-center">
      <button type="submit"
      class="w-auto bg-[#00dac6] hover:bg-[#00c7ab] hover:text-white text-black font-semibold py-1.5 px-3 sm:py-2 sm:px-4 rounded-md transition duration-300 text-xs sm:text-sm">
      Log In
      </button> 
    </div> 
  </form>
</div>
{% endblock %}
